replicaCount: 1

image:
  repository: ollama/ollama
  tag: "latest"
  pullPolicy: IfNotPresent

model:
  name: "qwen2.5:0.5b"

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

service:
  type: ClusterIP
  port: 11434      # Ollama usa el puerto 11434

metrics:
  path: "/metrics"
  port: 11434
  interval: "10s"